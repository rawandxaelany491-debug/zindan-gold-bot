services:
  - type: worker
    name: gold-telegram-bot
    env: python

    buildCommand: "pip install -r requirements.txt"
    startCommand: "python main.py"

    plan: free

    autoDeploy: true

    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false

      - key: OPENAI_API_KEY
        sync: false

      - key: OPENAI_MODEL
        value: gpt-4.1

      - key: LOG_LEVEL
        value: INFO

      - key: DEFAULT_RISK_PERCENT
        value: "1.0"

      - key: REQUEST_TIMEOUT
        value: "60"
